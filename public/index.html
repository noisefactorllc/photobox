<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Photobox — Real-Time Camera Effects</title>
    <meta name="description" content="Free browser-based photo booth with GPU shader effects. No install, no account, no tracking. Built on the Noisemaker engine.">

    <!-- OpenGraph -->
    <meta property="og:title" content="Photobox — Real-Time Camera Effects">
    <meta property="og:description" content="Free browser-based photo booth with GPU shader effects. No install, no account, no tracking.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://photobox.noisefactor.io/">
    <meta property="og:image" content="https://photobox.noisefactor.io/img/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:site_name" content="Noise Factor">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Photobox — Real-Time Camera Effects">
    <meta name="twitter:description" content="Free browser-based photo booth with GPU shader effects. No install, no account, no tracking.">
    <meta name="twitter:image" content="https://photobox.noisefactor.io/img/og-image.png">

    <link rel="canonical" href="https://photobox.noisefactor.io/">

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Photobox",
        "description": "Free browser-based photo booth with GPU shader effects built on the Noisemaker engine.",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Any",
        "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
        }
    }
    </script>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Photobox">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="preconnect" href="https://shaders.noisedeck.app" crossorigin>
    <link rel="stylesheet" href="css/colors.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div id="app">
        <header id="title-bar">
            <h1>PHOTOBOX</h1>
        </header>
        <main id="stage">
            <!-- Grid View -->
            <div id="grid-view">
                <div class="grid-container" id="effect-grid">
                    <!-- tiles created by JS -->
                </div>
            </div>

            <!-- Full-Size View (hidden initially) -->
            <div id="fullsize-view" class="hidden">
                <div class="fullsize-container">
                    <div class="fullsize-canvas-wrapper">
                        <canvas id="fullsize-canvas"></canvas>
                    </div>
                    <div class="fullsize-top-bar">
                        <button id="grid-back-btn-mobile" class="grid-back-btn">Grid</button>
                        <span id="effect-name-mobile" class="effect-name"></span>
                        <span></span><!-- spacer for centering -->
                    </div>
                    <div class="fullsize-controls">
                        <div class="controls-left">
                            <button id="grid-back-btn" class="grid-back-btn">Grid</button>
                            <div class="mode-toggle">
                                <button class="mode-btn active" data-mode="photo">Photo</button>
                                <button class="mode-btn" data-mode="video">Video</button>
                            </div>
                        </div>
                        <button id="shutter-btn" class="shutter-btn"></button>
                        <div class="controls-right">
                            <span id="effect-name" class="effect-name"></span>
                            <div id="recording-status" class="recording-indicator hidden">
                                <span class="recording-dot"></span>
                                <span id="recording-timer">0:00</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer id="filmstrip">
            <div class="tab-bar" id="tab-bar">
                <!-- Tab buttons created by JS -->
            </div>
            <div id="filmstrip-thumbs" class="filmstrip-thumbs hidden">
                <!-- Gallery thumbnails -->
            </div>
            <button id="about-btn" class="about-btn" title="About Photobox" aria-label="About Photobox">
                <svg viewBox="0 0 20 20" fill="currentColor" width="20" height="20">
                    <circle cx="10" cy="5.5" r="1.5"/>
                    <rect x="8.75" y="8.5" width="2.5" height="7" rx="1"/>
                </svg>
            </button>
            <div class="filmstrip-divider"></div>
            <button id="mirror-btn" class="mirror-btn" title="Flip horizontal" aria-label="Flip horizontal">
                <svg viewBox="0 0 20 20" fill="currentColor" width="20" height="20">
                    <polygon points="2,10 8,5 8,15"/>
                    <polygon points="18,10 12,5 12,15"/>
                    <rect x="9.5" y="4" width="1" height="12" opacity="0.5"/>
                </svg>
            </button>
            <div class="filmstrip-divider camera-flip-divider hidden"></div>
            <button id="camera-flip-btn" class="camera-flip-btn hidden" title="Switch camera" aria-label="Switch camera">
                <svg viewBox="0 -960 960 960" fill="currentColor" width="20" height="20">
                    <path d="M280-240v120-720 600Zm228.5-491.5Q520-743 520-760t-11.5-28.5Q497-800 480-800t-28.5 11.5Q440-777 440-760t11.5 28.5Q463-720 480-720t28.5-11.5ZM680-240h80v120q0 33-23.5 56.5T680-40H280q-33 0-56.5-23.5T200-120v-720q0-33 23.5-56.5T280-920h400q33 0 56.5 23.5T760-840v120h-80v-120H280v720h400v-120Zm-100-80q-25 0-42.5-17.5T520-380v-160q0-25 17.5-42.5T580-600h40l40-40h80l40 40h40q25 0 42.5 17.5T880-540v160q0 25-17.5 42.5T820-320H580Zm169.5-90.5Q770-431 770-460t-20.5-49.5Q729-530 700-530t-49.5 20.5Q630-489 630-460t20.5 49.5Q671-390 700-390t49.5-20.5Z"/>
                </svg>
            </button>
        </footer>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
