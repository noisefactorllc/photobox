name: ci

on:
  pull_request:
  push:
    branches: [main, preview]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      # Audit-mode egress monitoring: records every outbound connection the
      # runner makes so exfil/C2 from a compromised dependency is detectable.
      # Non-blocking (audit) — does not fail the build.
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        # --ignore-scripts blocks dependency lifecycle scripts (the install-time
        # code-exec vector for a compromised package). Modern native deps
        # (esbuild, sharp, rollup) ship prebuilt platform binaries as optional
        # deps and do not need postinstall. If a repo's build genuinely needs a
        # rebuild, that fails only this dep-bump PR's gate (surfaces in triage),
        # never a production build.
        run: npm ci --ignore-scripts

      - name: Lint
        run: |
          if jq -e '.scripts.lint' package.json >/dev/null 2>&1; then
            npm run lint
          else
            echo "No lint script — skipping"
          fi

      - name: Build
        run: |
          if jq -e '.scripts.build' package.json >/dev/null 2>&1; then
            build_cmd=$(jq -r '.scripts.build' package.json)
            if echo "$build_cmd" | grep -qE '(docker-compose|docker compose)'; then
              echo "Docker-based build — skipped in CI"
            else
              npm run build
            fi
          else
            echo "No build script — skipping"
          fi

      - name: Unit tests
        # continue-on-error so E2E tests that need a browser/server/DB don't
        # block patch auto-merge. Install + Lint + Build are the real gates
        # for dep-bump compatibility; tests are informational here.
        continue-on-error: true
        run: |
          if jq -e '.scripts.test' package.json >/dev/null 2>&1; then
            test_cmd=$(jq -r '.scripts.test' package.json)
            if [ "$test_cmd" = 'echo "Error: no test specified" && exit 1' ]; then
              echo "Placeholder test script — skipping"
            elif echo "$test_cmd" | grep -qiE '(playwright|test-e2e)'; then
              echo "E2E tests require browser/server — skipping in install CI"
            else
              npm test
            fi
          else
            echo "No test script — skipping"
          fi
